<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ Панель - Анкета</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --surface-light: #2d2d2d;
      --primary: #FFA500;
      --primary-hover: #cc8400;
      --text: #f3f4f6;
      --text-secondary: #9ca3af;
      --border: #333333;
      --success: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border);
    }
    .stat-card .label { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 8px; }
    .stat-card .value { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
    
    table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--surface-light); color: var(--text-secondary); font-weight: 500; font-size: 0.85rem; }
    tr:hover { background: var(--surface-light); cursor: pointer; }
    
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
    .badge.finished { background: rgba(16,185,129,0.2); color: var(--success); }
    .badge.active { background: rgba(255,165,0,0.2); color: var(--primary); }
    
    .btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: var(--primary); color: #121212; }
    .btn:hover { background: var(--primary-hover); }

    /* Modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; backdrop-filter: blur(4px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      max-width: 680px; width: 100%; max-height: 85vh; overflow-y: auto;
    }
    .modal-header {
      padding: 24px 28px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .modal-header h2 { color: var(--primary); }
    .modal-close {
      background: var(--surface-light); border: none; color: var(--text);
      font-size: 1.2rem; width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
    }
    .modal-body { padding: 20px 28px 28px; }
    .qa-item { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
    .qa-question { font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .qa-answer {
      font-size: 0.95rem; color: var(--text); background: var(--surface-light);
      padding: 12px 16px; border-radius: 12px; border-left: 3px solid var(--primary);
    }
    .qa-answer.empty { color: var(--text-secondary); font-style: italic; border-left-color: var(--border); }
    .qa-chip {
      display: inline-block; background: rgba(255,165,0,0.15); color: var(--primary);
      padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; margin: 4px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Анкета - Панель (Firebase)</h1>
    <div>
      <button class="btn" onclick="exportHTML()">Скачать всё</button>
      <button class="btn" onclick="exportHTML(true)" style="background:#10b981;">Скачать завершённые</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="label">Всего сессий</div><div class="value" id="statTotal">0</div></div>
    <div class="stat-card"><div class="label">Завершили</div><div class="value" id="statFinished">0</div></div>
    <div class="stat-card"><div class="label">В процессе</div><div class="value" id="statActive">0</div></div>
  </div>

  <table>
    <thead><tr><th>Имя</th><th>Дата</th><th>Прогресс</th><th>Статус</th></tr></thead>
    <tbody id="sessionsTable"><tr><td colspan="4" style="text-align:center;">Загрузка...</td></tr></tbody>
  </table>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="detailsModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header">
        <div><h2 id="modalUserName">Пользователь</h2></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD19JGl5WQ6J9DluiZ2h5tS2-4XOQK_JKc",
      authDomain: "anketa-roygon.firebaseapp.com",
      projectId: "anketa-roygon",
      storageBucket: "anketa-roygon.firebasestorage.app",
      messagingSenderId: "336789061218",
      appId: "1:336789061218:web:3c3e226a076705a2bedb3b",
      measurementId: "G-KFKRE3GZ40"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const questions = [
      "1. Дар муносибатҳо ҳозир дарди асосии ту чист?",
      "2. Кадом ҳис бештар дар ту такрор мешавад?",
      "3. Вақте мард сард мешавад ё камтар менависад, ту чӣ кор мекунӣ?",
      "4. Аз ҳама бештар аз чӣ метарсӣ?",
      "5. Вақте мард дур мешавад, дар бадани ту чӣ мешавад?",
      "6. Барои нигоҳ доштани мард чӣ кор мекунӣ, ки баъд пушаймон мешавӣ?",
      "7. Чаро фикр мекунӣ мард туро пурра интихоб намекунад?",
      "8. Дар назди мард ту бештар кӣ мешавӣ?",
      "9. Кадом рафтори мард туро сахт мешиканад?",
      "10. Кадом сухан ё ҷумла то имрӯз дар сарат садо медиҳад?",
      "11. Дар кӯдакӣ бештар аз кӣ шикастӣ?",
      "12. Бори аввал кай худро нолозим, нодида ё беқадр ҳис кардӣ?",
      "13. Ту дар бораи худ чӣ фикри дарднок дорӣ?",
      "14. Пеш барои ин мушкил чӣ кор кардӣ ва чӣ кӯмак кард?",
      "15. Чӣ кӯмак накард ё ҳатто бадтар кард?",
      "16. Агар ин мушкил ҳал нашавад, баъди 1 сол зиндагият чӣ мешавад?",
      "17. Агар ин мушкил ҳал шавад, ту чӣ гуна зан мешавӣ?",
      "18. Ба кадом формат бештар бовар мекунӣ?",
      "19. Барои ҳалли ин дард чӣ қадар маблағ дода метавонӣ?",
      "20. Аз ман ҳамчун мутахассис чӣ интизор мешавӣ?"
    ];

    let allSessions = [];

    db.collection('sessions').onSnapshot(
      snapshot => {
        allSessions = [];
        let finished = 0, active = 0;

        snapshot.forEach(doc => {
          const data = doc.data();
          allSessions.push({ id: doc.id, ...data });
          if (data.status === 'finished') finished++; else active++;
        });

        allSessions.sort((a, b) => {
          const ta = a.updatedAt?.toDate() || a.createdAt?.toDate() || 0;
          const tb = b.updatedAt?.toDate() || b.createdAt?.toDate() || 0;
          return tb - ta;
        });

        document.getElementById('statTotal').textContent = allSessions.length;
        document.getElementById('statFinished').textContent = finished;
        document.getElementById('statActive').textContent = active;

        renderTable();
      },
      error => {
        document.getElementById('sessionsTable').innerHTML =
          '<tr><td colspan="4" style="text-align:center;color:#ef4444;">Ошибка загрузки: ' + error.message + '</td></tr>';
      }
    );

    function renderTable() {
      const tbody = document.getElementById('sessionsTable');
      if (allSessions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Нет данных</td></tr>';
        return;
      }

      tbody.innerHTML = allSessions.map(s => {
        const date = s.createdAt ? s.createdAt.toDate().toLocaleString('ru') : '';
        const progress = s.status === 'finished' ? '20/20 ✅' : `${s.currentQ || 0}/20`;
        return `
          <tr onclick="openModal('${s.id}')">
            <td><strong>${s.userName || 'Аноним'}</strong></td>
            <td>${date}</td>
            <td>${progress}</td>
            <td><span class="badge ${s.status}">${s.status === 'finished' ? 'Завершён' : 'Активен'}</span></td>
          </tr>
        `;
      }).join('');
    }

    function openModal(id) {
      const session = allSessions.find(s => s.id === id);
      if(!session) return;
      
      document.getElementById('modalUserName').textContent = session.userName || 'Аноним';
      
      let html = '';
      const answers = session.answers || {};
      
      questions.forEach((q, i) => {
        const ans = answers[String(i)];
        let ansHtml = '';
        if (!ans) {
          ansHtml = '<div class="qa-answer empty">— (нет ответа)</div>';
        } else if (Array.isArray(ans)) {
          ansHtml = '<div>' + ans.map(a => `<span class="qa-chip">${a}</span>`).join('') + '</div>';
        } else {
          ansHtml = `<div class="qa-answer">${String(ans).replace(/\\n/g, '<br>')}</div>`;
        }
        html += `<div class="qa-item"><div class="qa-question">${q}</div>${ansHtml}</div>`;
      });

      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('detailsModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('detailsModal').classList.add('hidden'); }
    
    function exportHTML(onlyFinished) {
      function esc(val) {
        return String(val).replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      let cards = '';
      let count = 0;

      allSessions.forEach(s => {
        if (onlyFinished && s.status !== 'finished') return;
        count++;
        const name = esc(s.userName || 'Аноним');
        const date = s.createdAt ? s.createdAt.toDate().toLocaleString('ru') : '';
        const status = s.status === 'finished' ? 'Завершён' : 'Активен';

        let answersHtml = '';
        questions.forEach((q, i) => {
          const ans = s.answers?.[String(i)];
          let ansText = '';
          if (!ans) {
            ansText = '<span class="empty">— нет ответа</span>';
          } else if (Array.isArray(ans)) {
            ansText = esc(ans.join(' | '));
          } else {
            ansText = esc(String(ans)).replace(/\n/g, '<br>');
          }
          answersHtml += `
            <div class="qa-block">
              <div class="q-text">${esc(q)}</div>
              <div class="a-text">${ansText}</div>
            </div>`;
        });

        cards += `
          <div class="card">
            <div class="card-header">
              <span class="card-name">${name}</span>
              <span class="card-date">${date}</span>
              <span class="badge ${s.status}">${status}</span>
            </div>
            ${answersHtml}
          </div>`;
      });

      const label = onlyFinished ? 'Завершённые' : 'Все';
      const html = `<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Экспорт анкеты — ${label} (${count})</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; padding: 12px; background: #f5f5f5; }
  h2 { margin-bottom: 16px; color: #333; font-size: 1.1rem; }
  .card {
    background: #fff; border: 1px solid #ccc; border-radius: 10px;
    margin-bottom: 16px; overflow: hidden;
  }
  .card-header {
    background: #FFA500; color: #121212; padding: 10px 14px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    font-weight: 700; font-size: 0.95rem;
  }
  .card-name { flex: 1; }
  .card-date { font-weight: 400; font-size: 0.8rem; opacity: 0.8; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
  .badge.finished { background: rgba(16,185,129,0.25); color: #065f46; }
  .badge.active { background: rgba(255,165,0,0.25); color: #92400e; }
  .qa-block {
    padding: 10px 14px; border-bottom: 1px solid #eee;
  }
  .qa-block:last-child { border-bottom: none; }
  .q-text { font-size: 0.8rem; font-weight: 600; color: #666; margin-bottom: 4px; }
  .a-text { font-size: 0.9rem; color: #222; line-height: 1.5; }
  .empty { color: #aaa; font-style: italic; }
  @media (max-width: 600px) {
    body { padding: 8px; }
    .card-header { flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style></head>
<body>
<h2>${label} (${count})</h2>
${cards}</body></html>`;

      const blob = new Blob([html], { type: 'text/html;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', `anketa_${onlyFinished ? 'finished' : 'all'}.html`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
